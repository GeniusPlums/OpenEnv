name: LeadQualEnv
version: 2.3.0
entrypoint: server.leadqualenv_environment:LeadQualOpenEnv
description: >-
  Deterministic real-estate outbound lead qualification benchmark.
  An AI agent acts as an SDR qualifying prospective buyers by uncovering
  budget, timeline, and decision authority before routing leads.
  Features adversarial hard-mode with misleading surface signals,
  personality-driven buyer responses, competitor pressure mechanics,
  lead temperature decay, and a real-world CRM requalification task.
author: Anish Adamane
license: MIT
tags:
  - openenv
  - real-estate
  - sales
  - lead-qualification
  - agent-benchmark
metadata:
  domain: real_estate_sales
  max_turns: 10
  # Approx bounds: max ~1.05 (4 verified probes + rapport + correct decision at turn 5),
  # min ~-1.05 (9 irrelevant turns + wrong decision at turn 10 with cold-lead decay).
  reward_range: [-1.1, 1.1]
  episode_length: 10
  tasks:
    - easy
    - medium
    - hard
    - requalification
  task_progression:
    easy: direct qualification with straightforward buyers
    medium: nurture vs qualify ambiguity with delayed timelines
    hard: misleading surface signals requiring verification probes
    requalification: re-engaging nurture leads with potentially changed circumstances
  decision_labels:
    - qualified
    - nurture
    - unqualified
  observation_fields:
    - conversation_history
    - known_signals
    - probe_log
    - turn_number
    - max_turns
    - lead_temperature
    - qualification_confidence
    - property_context
    - competitor_mentioned
    - previous_crm
  action_fields:
    - message
    - decision

